<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c2e22"/><stop offset="1" stop-color="#103d2d"/></linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c2e22"/><stop offset="1" stop-color="#155e43"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0d98a"/><stop offset="1" stop-color="#b8902f"/></linearGradient>
    <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#103d2d"/><stop offset="1" stop-color="#0c2e22"/></linearGradient>
  </defs>

  <!-- page bg -->
  <rect width="1200" height="780" fill="#f4f7f5"/>

  <!-- ===== Sidebar ===== -->
  <rect width="256" height="780" fill="url(#side)"/>
  <!-- logo emblem -->
  <g transform="translate(18,20)">
    <rect width="42" height="42" rx="11" fill="url(#emb)" stroke="url(#gold)" stroke-width="2"/>
    <path fill="url(#gold)" d="M9 31 L9 11 L16 11 L21 23 L26 11 L33 11 L33 31 L27 31 L27 20 L23 29 L19 29 L15 20 L15 31 Z"/>
  </g>
  <text x="70" y="34" fill="#fff" font-size="14" font-weight="700">Grupo Midas Angola</text>
  <text x="70" y="50" fill="#d4af37" font-size="11">Do Zero ao Emprego</text>
  <line x1="0" y1="74" x2="256" y2="74" stroke="rgba(255,255,255,.08)"/>

  <!-- nav -->
  <g font-size="13.5" font-weight="600">
    <rect x="10" y="92" width="236" height="40" rx="10" fill="rgba(212,175,55,.16)"/>
    <rect x="10" y="92" width="3" height="40" fill="#d4af37"/>
    <text x="30" y="117" fill="#fff">▦  Dashboard</text>
    <text x="30" y="160" fill="#cfe0d8">＋  Nova Matrícula</text>
    <text x="30" y="200" fill="#cfe0d8">☰  Estudantes</text>
    <text x="30" y="240" fill="#cfe0d8">▤  Cursos</text>
    <text x="30" y="280" fill="#cfe0d8">₭  Pagamentos</text>
    <text x="30" y="320" fill="#cfe0d8">🧾  Recibos</text>
    <text x="30" y="360" fill="#cfe0d8">▣  Relatórios</text>
    <text x="30" y="400" fill="#cfe0d8">⚙  Configurações</text>
  </g>
  <!-- footer -->
  <rect x="14" y="690" width="228" height="30" rx="8" fill="rgba(255,255,255,.08)"/>
  <text x="26" y="710" fill="#fff" font-size="12" font-weight="600">👤 Secretaria</text>
  <rect x="14" y="728" width="228" height="32" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(240,200,195,.25)"/>
  <text x="26" y="749" fill="#f0c8c3" font-size="12" font-weight="600">⎋ Terminar sessão</text>

  <!-- ===== Content ===== -->
  <!-- Hero -->
  <rect x="288" y="24" width="888" height="158" rx="18" fill="url(#hero)"/>
  <text x="316" y="74" fill="#fff" font-size="30" font-weight="800">Turmas Midas 2026</text>
  <rect x="316" y="88" width="150" height="26" rx="13" fill="#d4af37"/>
  <text x="328" y="106" fill="#0c2e22" font-size="13" font-weight="700">Do Zero ao Emprego</text>
  <text x="316" y="140" fill="rgba(255,255,255,.85)" font-size="13">Gestão de matrículas, cursos, pagamentos e recibos — simples e profissional.</text>
  <!-- hero buttons -->
  <rect x="316" y="150" width="140" height="20" rx="6" fill="#d4af37"/><text x="334" y="164" fill="#0c2e22" font-size="11" font-weight="700">＋ Nova Matrícula</text>
  <rect x="466" y="150" width="120" height="20" rx="6" fill="rgba(255,255,255,.15)"/><text x="482" y="164" fill="#fff" font-size="11" font-weight="700">🧾 Gerar Recibo</text>
  <rect x="596" y="150" width="105" height="20" rx="6" fill="rgba(255,255,255,.15)"/><text x="612" y="164" fill="#fff" font-size="11" font-weight="700">▤ Ver Cursos</text>

  <!-- Stat cards -->
  <g>
    <!-- card template -->
    <g>
      <rect x="288" y="204" width="210" height="92" rx="14" fill="#fff" stroke="#e2e8e4"/>
      <text x="306" y="232" fill="#5d6b65" font-size="12" font-weight="600">Estudantes matriculados</text>
      <text x="306" y="268" fill="#0c2e22" font-size="26" font-weight="800">128</text>
      <text x="468" y="284" fill="#b8902f" font-size="20">👥</text>
    </g>
    <g>
      <rect x="514" y="204" width="210" height="92" rx="14" fill="#fff" stroke="#e2e8e4"/>
      <text x="532" y="232" fill="#5d6b65" font-size="12" font-weight="600">Total recebido</text>
      <text x="532" y="268" fill="#0c2e22" font-size="23" font-weight="800">3 240 000 Kz</text>
      <text x="694" y="284" fill="#b8902f" font-size="20">₭</text>
    </g>
    <g>
      <rect x="740" y="204" width="210" height="92" rx="14" fill="#fff" stroke="#e2e8e4"/>
      <text x="758" y="232" fill="#5d6b65" font-size="12" font-weight="600">Cursos ativos</text>
      <text x="758" y="268" fill="#0c2e22" font-size="26" font-weight="800">14</text>
      <text x="920" y="284" fill="#b8902f" font-size="20">▤</text>
    </g>
    <g>
      <rect x="966" y="204" width="210" height="92" rx="14" fill="#fff" stroke="#e2e8e4"/>
      <text x="984" y="232" fill="#5d6b65" font-size="12" font-weight="600">Turmas abertas</text>
      <text x="984" y="268" fill="#0c2e22" font-size="26" font-weight="800">9</text>
      <text x="1146" y="284" fill="#b8902f" font-size="20">🏫</text>
    </g>
  </g>

  <!-- Two cards -->
  <!-- Matrículas recentes -->
  <rect x="288" y="316" width="572" height="440" rx="14" fill="#fff" stroke="#e2e8e4"/>
  <text x="308" y="348" fill="#0c2e22" font-size="16" font-weight="700">Matrículas recentes</text>
  <rect x="308" y="364" width="532" height="30" fill="#e9f3ee"/>
  <text x="318" y="384" fill="#0c2e22" font-size="11" font-weight="700">ESTUDANTE</text>
  <text x="560" y="384" fill="#0c2e22" font-size="11" font-weight="700">CURSO</text>
  <text x="770" y="384" fill="#0c2e22" font-size="11" font-weight="700">ESTADO</text>
  <g font-size="12.5" fill="#1b2421">
    <g><text x="318" y="420" font-weight="700">Ana Silva</text><text x="318" y="436" fill="#5d6b65" font-size="11">MAT-2026-0001</text><text x="560" y="426">Farmácia</text><rect x="770" y="412" width="56" height="20" rx="10" fill="#e3f4ec"/><text x="780" y="426" fill="#1b7a57" font-size="11" font-weight="700">ativo</text></g>
    <line x1="308" y1="448" x2="840" y2="448" stroke="#e2e8e4"/>
    <g><text x="318" y="476" font-weight="700">João Mendes</text><text x="318" y="492" fill="#5d6b65" font-size="11">MAT-2026-0002</text><text x="560" y="482">Análises Clínicas</text><rect x="770" y="468" width="56" height="20" rx="10" fill="#e3f4ec"/><text x="780" y="482" fill="#1b7a57" font-size="11" font-weight="700">ativo</text></g>
    <line x1="308" y1="504" x2="840" y2="504" stroke="#e2e8e4"/>
    <g><text x="318" y="532" font-weight="700">Maria Lopes</text><text x="318" y="548" fill="#5d6b65" font-size="11">MAT-2026-0003</text><text x="560" y="538">Téc. de Enfermagem</text><rect x="770" y="524" width="74" height="20" rx="10" fill="#fbf0d8"/><text x="780" y="538" fill="#c98a18" font-size="11" font-weight="700">pendente</text></g>
    <line x1="308" y1="560" x2="840" y2="560" stroke="#e2e8e4"/>
    <g><text x="318" y="588" font-weight="700">Pedro Costa</text><text x="318" y="604" fill="#5d6b65" font-size="11">MAT-2026-0004</text><text x="560" y="594">Fisioterapia</text><rect x="770" y="580" width="56" height="20" rx="10" fill="#e3f4ec"/><text x="780" y="594" fill="#1b7a57" font-size="11" font-weight="700">ativo</text></g>
    <line x1="308" y1="616" x2="840" y2="616" stroke="#e2e8e4"/>
    <g><text x="318" y="644" font-weight="700">Inês Ferreira</text><text x="318" y="660" fill="#5d6b65" font-size="11">MAT-2026-0005</text><text x="560" y="650">Nutrição e Dietética</text><rect x="770" y="636" width="56" height="20" rx="10" fill="#e3f4ec"/><text x="780" y="650" fill="#1b7a57" font-size="11" font-weight="700">ativo</text></g>
  </g>

  <!-- Últimos pagamentos -->
  <rect x="876" y="316" width="300" height="440" rx="14" fill="#fff" stroke="#e2e8e4"/>
  <text x="896" y="348" fill="#0c2e22" font-size="16" font-weight="700">Últimos pagamentos</text>
  <rect x="896" y="364" width="260" height="30" fill="#e9f3ee"/>
  <text x="906" y="384" fill="#0c2e22" font-size="11" font-weight="700">RECIBO</text>
  <text x="1070" y="384" fill="#0c2e22" font-size="11" font-weight="700">VALOR</text>
  <g font-size="12" fill="#1b2421">
    <g><text x="906" y="420" font-weight="700">REC-2026-00012</text><text x="906" y="435" fill="#5d6b65" font-size="10.5">Ana Silva</text><text x="1060" y="424" fill="#0c2e22" font-weight="700">15 000 Kz</text></g>
    <line x1="896" y1="448" x2="1156" y2="448" stroke="#e2e8e4"/>
    <g><text x="906" y="476" font-weight="700">REC-2026-00011</text><text x="906" y="491" fill="#5d6b65" font-size="10.5">João Mendes</text><text x="1060" y="480" fill="#0c2e22" font-weight="700">22 000 Kz</text></g>
    <line x1="896" y1="504" x2="1156" y2="504" stroke="#e2e8e4"/>
    <g><text x="906" y="532" font-weight="700">REC-2026-00010</text><text x="906" y="547" fill="#5d6b65" font-size="10.5">Maria Lopes</text><text x="1060" y="536" fill="#0c2e22" font-weight="700">5 000 Kz</text></g>
    <line x1="896" y1="560" x2="1156" y2="560" stroke="#e2e8e4"/>
    <g><text x="906" y="588" font-weight="700">REC-2026-00009</text><text x="906" y="603" fill="#5d6b65" font-size="10.5">Pedro Costa</text><text x="1060" y="592" fill="#0c2e22" font-weight="700">25 000 Kz</text></g>
    <line x1="896" y1="616" x2="1156" y2="616" stroke="#e2e8e4"/>
    <g><text x="906" y="644" font-weight="700">REC-2026-00008</text><text x="906" y="659" fill="#5d6b65" font-size="10.5">Inês Ferreira</text><text x="1060" y="648" fill="#0c2e22" font-weight="700">22 000 Kz</text></g>
  </g>
</svg>
