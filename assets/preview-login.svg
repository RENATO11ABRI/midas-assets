<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c2e22"/><stop offset="1" stop-color="#155e43"/></linearGradient>
    <radialGradient id="glow" cx="80%" cy="0%" r="60%"><stop offset="0" stop-color="rgba(212,175,55,.30)"/><stop offset="1" stop-color="rgba(212,175,55,0)"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0d98a"/><stop offset="1" stop-color="#b8902f"/></linearGradient>
    <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#103d2d"/><stop offset="1" stop-color="#0c2e22"/></linearGradient>
  </defs>
  <rect width="1200" height="780" fill="url(#bg)"/>
