  <text x="600" y="326" text-anchor="middle" fill="#155e43" font-size="14" font-weight="700">Turmas Midas 2026</text>
  <rect x="512" y="338" width="176" height="24" rx="12" fill="#d4af37"/>
  <text x="600" y="355" text-anchor="middle" fill="#0c2e22" font-size="12" font-weight="700">Do Zero ao Emprego</text>

