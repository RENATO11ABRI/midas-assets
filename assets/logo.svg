<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Grupo Midas Angola">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103d2d"/>
      <stop offset="1" stop-color="#0c2e22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d98a"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#b8902f"/>
    </linearGradient>
  </defs>
  <!-- emblem background -->
  <rect x="6" y="6" width="188" height="188" rx="42" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="42" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.85"/>
  <!-- M monogram -->
  <path fill="url(#gold)" d="M44 138 L44 58 L72 58 L100 104 L128 58 L156 58 L156 138 L132 138 L132 92 L110 128 L90 128 L68 92 L68 138 Z"/>
  <!-- rising arrow: 'do zero ao emprego' (growth) -->
  <path fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
        d="M50 162 L92 162 L120 150 L150 132"/>
  <path fill="url(#gold)" d="M150 132 l-19 1 l9 -16 z"/>
</svg>
