<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pré-matrícula — Turmas Midas 2026 | Grupo Midas Angola</title>
  <meta name="description" content="Faça a sua pré-inscrição nas Turmas Midas 2026. Entraremos em contacto consigo." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <meta name="theme-color" content="#0f5132" />
  <style>
    :root { --green:#0f5132; --gold:#d69e2e; --ink:#0b1220; --muted:#5b6675; --line:#e6e9ef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--ink); background:#f4f6fa; }
    .hero { background: linear-gradient(135deg, var(--green), #0b3a24); color:#fff; padding: 28px 18px; text-align:center; }
    .hero img { height: 54px; }
    .hero h1 { margin:.5rem 0 .25rem; font-size: 1.5rem; }
    .hero p { margin:0; opacity:.9; }
    .wrap { max-width: 620px; margin: -28px auto 40px; padding: 0 14px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding: 22px; box-shadow: 0 10px 30px rgba(15,81,50,.08); }
    label { display:block; font-weight:600; font-size:.92rem; margin: 12px 0 5px; }
    .req { color:#b02a37; }
    input, select, textarea { width:100%; padding: 11px 12px; border:1px solid var(--line); border-radius:10px; font-size: 1rem; font-family:inherit; background:#fff; }
    input:focus, select:focus, textarea:focus { outline:2px solid var(--gold); border-color: var(--gold); }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width:520px){ .row { grid-template-columns: 1fr; } }
    .hp { position:absolute; left:-9999px; }
    button { margin-top: 18px; width:100%; padding: 13px; border:0; border-radius: 12px; background: var(--green); color:#fff; font-size:1.05rem; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.6; cursor: default; }
    .msg { margin-top:14px; padding:12px 14px; border-radius:10px; font-weight:600; display:none; }
    .msg.ok { background:#e6f4ec; color:#0f5132; display:block; }
    .msg.err { background:#fdecee; color:#b02a37; display:block; }
    .foot { text-align:center; color:var(--muted); font-size:.85rem; margin-top:18px; }
    .ok-box { text-align:center; padding: 10px 0; }
    .ok-box .big { font-size: 3rem; }
  </style>
</head>
<body>
  <header class="hero">
    <img src="assets/logo.svg" alt="Grupo Midas Angola" />
    <h1>Pré-matrícula · Turmas Midas 2026</h1>
    <p>Do Zero ao Emprego — deixe os seus dados e nós entramos em contacto.</p>
  </header>

  <main class="wrap">
    <div class="card" id="formCard">
      <form id="form" autocomplete="on">
        <label>Nome completo <span class="req">*</span></label>
        <input name="nome" required minlength="3" placeholder="O seu nome" />

        <div class="row">
          <div>
            <label>Telefone / contacto <span class="req">*</span></label>
            <input name="contacto" required minlength="6" inputmode="tel" placeholder="9xx xxx xxx" />
          </div>
          <div>
            <label>WhatsApp</label>
            <input name="whatsapp" inputmode="tel" placeholder="9xx xxx xxx" />
          </div>
        </div>

        <label>Curso de interesse</label>
        <input name="curso" list="cursos" placeholder="Ex.: Curso Médio de Enfermagem" />
        <datalist id="cursos"></datalist>

        <div class="row">
          <div>
            <label>Período preferido</label>
            <select name="periodo">
              <option value="">—</option>
              <option>Manhã</option><option>Tarde</option><option>Noite</option><option>Fim de semana</option>
            </select>
          </div>
          <div>
            <label>Unidade / Polo</label>
            <input name="unidade" placeholder="Ex.: Sede" />
          </div>
        </div>

        <label>Mensagem (opcional)</label>
        <textarea name="mensagem" rows="3" placeholder="Alguma questão?"></textarea>

        <!-- honeypot anti-spam (não preencher) -->
        <input class="hp" tabindex="-1" autocomplete="off" name="website" />

        <button type="submit" id="btn">Enviar pré-inscrição</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <p class="foot">© 2026 Grupo Midas Angola</p>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function () {
      var cfg = window.MIDAS_CONFIG || {};
      var form = document.getElementById("form");
      var btn = document.getElementById("btn");
      var msg = document.getElementById("msg");
      function show(t, cls) { msg.textContent = t; msg.className = "msg " + cls; }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) { show("Formulário ainda não configurado. Contacte a instituição.", "err"); return; }
        var fd = new FormData(form);
        var body = {};
        fd.forEach(function (v, k) { body[k] = v; });
        btn.disabled = true; btn.textContent = "A enviar…";
        fetch(cfg.supabaseUrl + "/functions/v1/lead-submit", {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": cfg.supabaseAnonKey, "Authorization": "Bearer " + cfg.supabaseAnonKey },
          body: JSON.stringify(body)
        }).then(function (r) { return r.json(); }).then(function (res) {
          if (res && res.ok) {
            document.getElementById("formCard").innerHTML =
              '<div class="ok-box"><div class="big">✅</div><h2>Pré-inscrição enviada!</h2>' +
              '<p>Obrigado, ' + (body.nome || "").replace(/</g, "") + '. A nossa equipa vai contactá-lo em breve.</p></div>';
          } else {
            show((res && res.error) || "Não foi possível enviar. Tente novamente.", "err");
            btn.disabled = false; btn.textContent = "Enviar pré-inscrição";
          }
        }).catch(function () {
          show("Sem ligação. Verifique a internet e tente novamente.", "err");
          btn.disabled = false; btn.textContent = "Enviar pré-inscrição";
        });
      });
    })();
  </script>
</body>
</html>
