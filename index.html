<!DOCTYPE html>
<html lang="pt" data-theme="light" data-palette="slate" data-sidebar="executive" data-density="comfortable">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDAS2026 — Do Zero ao Emprego | Grupo Midas Angola</title>
  <meta name="description" content="Sistema de gestão de matrículas, cursos, pagamentos e recibos do Grupo Midas Angola." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f5132" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MIDAS 2026" />
  <link rel="apple-touch-icon" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Sistema de design premium (carregado depois: redefine tokens e re-estiliza
       os componentes partilhados; styles.css mantém login/modais/toasts/recibos) -->
  <link rel="stylesheet" href="css/midas-ds.css" />
</head>
<body>
  <!-- ===== Login screen ===== -->
  <div id="loginScreen" class="login" hidden></div>

  <!-- ===== App Shell ===== -->
  <div class="app" id="app" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="side-brand">
        <img src="assets/logo.svg" alt="Grupo Midas Angola" class="logo" />
        <div class="bt">
          <strong>Grupo Midas Angola</strong>
          <small>MIDAS2026</small>
        </div>
      </div>
      <nav class="nav">
        <a href="#dashboard" class="nav-link" data-route="dashboard"><span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span> Dashboard</a>
        <a href="#matricula" class="nav-link" data-route="matricula"><span class="ico"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6" stroke-linecap="round"/></svg></span> Nova Matrícula</a>
        <a href="#recibos" class="nav-link" data-route="recibos"><span class="ico"><svg viewBox="0 0 24 24"><path d="M5 3h14v18l-3-2-2 2-2-2-2 2-2-2-3 2V3z"/><path d="M9 8h6M9 12h6" stroke-linecap="round"/></svg></span> Recibos</a>
        <a href="#estudantes" class="nav-link" data-route="estudantes"><span class="ico"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Estudantes</a>
        <a href="#cursos" class="nav-link" data-route="cursos"><span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> Cursos</a>
        <a href="#pagamentos" class="nav-link" data-route="pagamentos"><span class="ico"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20" stroke-linecap="round"/></svg></span> Pagamentos</a>
        <a href="#fecho" class="nav-link" data-route="fecho"><span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v4h10V4M8 12h2M8 16h2M14 12h2M14 16h2" stroke-linecap="round"/></svg></span> Fecho de Caixa</a>
        <a href="#midas" class="nav-link" data-route="midas"><span class="ico"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 6.9H22l-6 4.4 2.3 7L12 16.9 5.7 20.3 8 13.3l-6-4.4h7.6z"/></svg></span> MIDAS 2026</a>
        <a href="#relatorios" class="nav-link" data-route="relatorios"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Relatórios</a>
        <a href="#config" class="nav-link" data-route="config"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Configurações</a>
      </nav>
      <div class="side-foot">
        <div class="sync-pill" id="syncPill" hidden></div>
        <div class="user-chip" id="userChip"></div>
        <button class="btn-logout" id="logoutBtn">Terminar sessão</button>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <!-- Content -->
    <div class="content">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg></button>
        <div class="crumbs"><span>Grupo Midas</span><span class="sep">/</span><span class="here" id="crumbHere">Dashboard</span></div>
        <div class="topbar-spacer"></div>
        <button class="icon-btn" id="modoToggle" aria-label="Tema (Dia/Noite)"><svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
        <div class="appe-wrap">
          <button class="icon-btn" id="appeBtn" aria-label="Aparência"><svg viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2a10 10 0 1 0 0 20 2.5 2.5 0 0 0 2-4 2.5 2.5 0 0 1 2-4h2a4 4 0 0 0 4-4 10 10 0 0 0-10-8z"/></svg></button>
          <div class="appe-pop" id="appePop" hidden>
            <div class="appe-grp"><div class="lbl">Paleta</div>
              <div class="pal-list">
                <div class="pal-opt" data-pal="slate"><span class="pal-sw"><i style="background:#0f172a"></i><i style="background:#14b8a6"></i><i style="background:#e2e8f0"></i></span><span class="pal-name">Slate + Turquesa</span></div>
                <div class="pal-opt" data-pal="supabase"><span class="pal-sw"><i style="background:#171717"></i><i style="background:#3ecf8e"></i><i style="background:#ececec"></i></span><span class="pal-name">Supabase</span></div>
                <div class="pal-opt" data-pal="midas"><span class="pal-sw"><i style="background:#0c2c20"></i><i style="background:#0f6243"></i><i style="background:#bd9442"></i></span><span class="pal-name">Midas Verde</span></div>
              </div>
            </div>
            <div class="appe-grp"><div class="lbl">Tema</div><div class="appe-seg" id="themeSeg"><button data-theme-set="light">Dia</button><button data-theme-set="dark">Noite</button></div></div>
            <div class="appe-grp"><div class="lbl">Sidebar</div><div class="appe-seg" id="sideSeg"><button data-side-set="executive">Escura</button><button data-side-set="light">Clara</button></div></div>
            <div class="appe-grp"><div class="lbl">Densidade</div><div class="appe-seg" id="densSeg"><button data-dens-set="comfortable">Confortável</button><button data-dens-set="compact">Compacta</button></div></div>
          </div>
        </div>
      </header>
      <main id="view"></main>
    </div>
  </div>

  <!-- Modal host -->
  <div class="modal-host" id="modalHost"></div>
  <!-- Toast host -->
  <div class="toast-host" id="toastHost"></div>

  <!-- Scripts (plain scripts so it works from file:// and any host) -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/views.js"></script>
  <!-- Backend online (Supabase). Se config.js estiver vazio, a app fica em modo local. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-data.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA: regista o service worker (instalável + cache offline da aplicação) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) { console.warn("SW falhou:", e); });
      });
    }
  </script>
</body>
</html>
