name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verificar sintaxe dos ficheiros JS
        run: for f in js/*.js; do node --check "$f"; done
      - name: Correr testes
        run: node --test
      - name: Garantir bump do cache do service worker
        if: github.event_name == 'pull_request'
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          mudou_app=$(git diff --name-only "$base"...HEAD | grep -E '^(js/|css/|index\.html)' || true)
          mudou_sw=$(git diff "$base"...HEAD -- sw.js | grep -E '^\+.*var CACHE' || true)
          if [ -n "$mudou_app" ] && [ -z "$mudou_sw" ]; then
            echo "::error::Alterou js/css/index.html mas não subiu a versão do cache (var CACHE em sw.js)."
            echo "$mudou_app"
            exit 1
          fi
          echo "OK — cache do service worker coerente."
