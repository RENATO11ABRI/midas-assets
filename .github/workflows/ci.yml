name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verificar sintaxe dos ficheiros JS
        run: for f in js/*.js; do node --check "$f"; done
      - name: Correr testes
        run: node --test
