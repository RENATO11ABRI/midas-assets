<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação de documento — Grupo Midas Angola</title>
  <meta name="description" content="Confirme a autenticidade de um recibo ou matrícula do Grupo Midas Angola." />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <meta name="theme-color" content="#0f5132" />
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color:#0b1220; background:#f4f6fa; }
    .hero { background: linear-gradient(135deg,#0f5132,#0b3a24); color:#fff; padding:26px 18px; text-align:center; }
    .hero img { height:48px; }
    .wrap { max-width:560px; margin:-24px auto 40px; padding:0 14px; }
    .card { background:#fff; border:1px solid #e6e9ef; border-radius:16px; padding:24px; box-shadow:0 10px 30px rgba(15,81,50,.08); text-align:center; }
    .big { font-size:3rem; }
    .valid { color:#0f5132; } .invalid { color:#b02a37; }
    table { width:100%; border-collapse:collapse; margin-top:16px; text-align:left; }
    th, td { padding:9px 6px; border-bottom:1px solid #eef1f5; font-size:.95rem; }
    th { color:#5b6675; font-weight:600; width:42%; }
    .foot { text-align:center; color:#5b6675; font-size:.85rem; margin-top:18px; }
  </style>
</head>
<body>
  <header class="hero">
    <img src="assets/logo.svg" alt="Grupo Midas Angola" />
    <h1>Verificação de documento</h1>
  </header>
  <main class="wrap">
    <div class="card" id="card"><p>A verificar…</p></div>
    <p class="foot">© 2026 Grupo Midas Angola</p>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function () {
      var cfg = window.MIDAS_CONFIG || {};
      var card = document.getElementById("card");
      var qs = new URLSearchParams(location.search);
      var t = qs.get("t") || "recibo";
      var id = qs.get("id") || "";
      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
      function moeda(v) { return (Number(v) || 0).toLocaleString("pt-PT", { minimumFractionDigits: 2 }) + " Kz"; }
      function dataPT(s) { var d = new Date(s); return isNaN(d) ? esc(s) : d.toLocaleDateString("pt-PT"); }

      if (!id) { card.innerHTML = '<div class="big invalid">⚠️</div><h2>Documento não indicado</h2><p>Faça a leitura do QR code do documento.</p>'; return; }
      if (!cfg.supabaseUrl) { card.innerHTML = '<div class="big invalid">⚠️</div><h2>Serviço indisponível</h2>'; return; }

      fetch(cfg.supabaseUrl + "/functions/v1/verificar?t=" + encodeURIComponent(t) + "&id=" + encodeURIComponent(id), {
        headers: { "apikey": cfg.supabaseAnonKey, "Authorization": "Bearer " + cfg.supabaseAnonKey }
      }).then(function (r) { return r.json(); }).then(function (res) {
        if (!res || !res.valido) {
          card.innerHTML = '<div class="big invalid">❌</div><h2 class="invalid">Documento não encontrado</h2><p>Este documento não consta dos nossos registos. Em caso de dúvida, contacte a instituição.</p>';
          return;
        }
        var rows = "";
        var add = function (k, v) { if (v) rows += "<tr><th>" + k + "</th><td>" + esc(v) + "</td></tr>"; };
        if (res.tipo === "matricula") {
          add("Tipo", "Matrícula"); add("Nº de matrícula", res.numero); add("Estudante", res.nome);
          add("Curso", res.curso); add("Data", dataPT(res.data)); add("Estado", res.estado);
        } else {
          add("Tipo", "Recibo"); add("Nº de recibo", res.numero); add("Estudante", res.nome);
          add("Curso", res.curso); add("Emolumento", res.emolumento);
          if (res.valor != null) rows += "<tr><th>Valor</th><td>" + moeda(res.valor) + "</td></tr>";
          add("Data", dataPT(res.data));
        }
        card.innerHTML = '<div class="big valid">✅</div><h2 class="valid">Documento válido</h2>' +
          '<p>Confirmado nos registos do Grupo Midas Angola.</p><table>' + rows + "</table>";
      }).catch(function () {
        card.innerHTML = '<div class="big invalid">⚠️</div><h2>Falha na verificação</h2><p>Sem ligação. Tente novamente.</p>';
      });
    })();
  </script>
</body>
</html>
